<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MailHaven Archive</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; font-size: 13px; }

    /* Auth */
    #auth-screen { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; }
    .logo { width: 140px; margin-bottom: 20px; }
    .form-group { width: 100%; margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: #2563eb; }
    .btn { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #dc2626; font-size: 12px; margin-top: 8px; text-align: center; }

    /* Main */
    #main-screen { display: none; flex-direction: column; height: 100vh; }
    .header { padding: 12px 16px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; }
    .header img { height: 28px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .badge { font-size: 11px; background: #eff6ff; color: #2563eb; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .logout-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 12px; padding: 4px 8px; border-radius: 6px; }
    .logout-btn:hover { background: #f1f5f9; color: #64748b; }

    /* Tabs */
    .tabs { display: flex; background: white; border-bottom: 1px solid #e2e8f0; }
    .tab { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 600; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: #2563eb; border-bottom-color: #2563eb; }

    /* Search */
    .search-bar { padding: 10px 12px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; gap: 8px; }
    .search-bar input { flex: 1; padding: 6px 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; outline: none; }
    .search-bar input:focus { border-color: #2563eb; }
    .search-btn { padding: 6px 12px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }

    /* Mailbox selector */
    .mailbox-select { padding: 8px 12px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    .mailbox-select select { width: 100%; padding: 6px 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; background: white; outline: none; }

    /* Email list */
    .email-list { flex: 1; overflow-y: auto; }
    .email-item { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background 0.15s; }
    .email-item:hover { background: #f8fafc; }
    .email-item.selected { background: #eff6ff; }
    .email-subject { font-weight: 600; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .email-meta { font-size: 11px; color: #94a3b8; display: flex; gap: 8px; }
    .email-meta .sender { color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
    .email-meta .date { flex-shrink: 0; }
    .spam-badge { display: inline-block; background: #fef2f2; color: #dc2626; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; margin-left: 4px; }
    .attach-icon { color: #94a3b8; margin-left: 4px; }

    /* Email detail */
    #email-detail { display: none; flex-direction: column; height: 100vh; }
    .detail-header { padding: 10px 12px; background: white; border-bottom: 1px solid #e2e8f0; }
    .back-btn { background: none; border: none; color: #2563eb; cursor: pointer; font-size: 12px; font-weight: 600; padding: 0; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
    .detail-subject { font-weight: 700; font-size: 14px; color: #1e293b; margin-bottom: 6px; }
    .detail-meta { font-size: 11px; color: #64748b; display: grid; gap: 2px; }
    .detail-meta span { display: flex; gap: 4px; }
    .detail-meta strong { color: #374151; min-width: 50px; }
    .detail-actions { padding: 8px 12px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; gap: 6px; flex-wrap: wrap; }
    .action-btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .action-btn.primary { background: #2563eb; color: white; }
    .action-btn.primary:hover { background: #1d4ed8; }
    .action-btn.secondary { background: white; color: #374151; border: 1px solid #e2e8f0; }
    .action-btn.secondary:hover { background: #f8fafc; }
    .action-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .detail-body { flex: 1; overflow-y: auto; padding: 12px; }
    .detail-body iframe { width: 100%; border: none; height: 300px; }
    .detail-body .text-body { white-space: pre-wrap; font-size: 12px; color: #374151; line-height: 1.6; }

    /* Restore panel */
    .restore-panel { padding: 8px 12px; background: #eff6ff; border-top: 1px solid #bfdbfe; display: none; }
    .restore-panel label { font-size: 11px; font-weight: 600; color: #1d4ed8; display: block; margin-bottom: 4px; }
    .restore-panel input { width: 100%; padding: 6px 8px; border: 1px solid #bfdbfe; border-radius: 6px; font-size: 12px; margin-bottom: 6px; outline: none; }
    .restore-panel input:focus { border-color: #2563eb; }

    /* States */
    .loading { text-align: center; padding: 30px; color: #94a3b8; font-size: 12px; }
    .empty { text-align: center; padding: 30px; color: #94a3b8; }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .success-msg { background: #f0fdf4; color: #16a34a; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; text-align: center; }
    .error-msg { background: #fef2f2; color: #dc2626; padding: 8px 12px; border-radius: 6px; font-size: 12px; text-align: center; }

    /* Pagination */
    .pagination { padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; background: white; border-top: 1px solid #e2e8f0; }
    .page-btn { padding: 4px 10px; border: 1px solid #e2e8f0; border-radius: 6px; background: white; cursor: pointer; font-size: 11px; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-info { font-size: 11px; color: #64748b; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <img class="logo" id="logo" src="" alt="MailHaven" onerror="this.style.display='none'">
  <h2 style="margin-bottom:4px;font-size:18px;color:#1e293b">MailHaven</h2>
  <p style="color:#64748b;font-size:12px;margin-bottom:20px">Accedi per visualizzare l'archivio email</p>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="login-email" placeholder="nome@azienda.it" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="login-btn" onclick="doLogin()">Accedi</button>
  <div class="error" id="login-error"></div>
  <p style="margin-top:16px;font-size:11px;color:#94a3b8;text-align:center">
    Il tuo accesso verrà ricordato per 30 giorni
  </p>
</div>

<!-- MAIN SCREEN -->
<div id="main-screen">
  <div class="header">
    <img src="MAILVAULT_URL/logo.svg" alt="MailHaven" onerror="this.style.display='none'">
    <div class="header-actions">
      <span class="badge" id="user-badge">-</span>
      <button class="logout-btn" onclick="doLogout()">Esci</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('search')">🔍 Archivio</div>
    <div class="tab" onclick="switchTab('current')">📧 Email corrente</div>
  </div>

  <div id="tab-search">
    <div class="mailbox-select">
      <select id="mailbox-select" onchange="loadEmails()">
        <option value="">— Seleziona casella —</option>
      </select>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Cerca oggetto, mittente..." onkeydown="if(event.key==='Enter') loadEmails()">
      <button class="search-btn" onclick="loadEmails()">Cerca</button>
    </div>
    <div id="email-list-container">
      <div class="empty"><div class="empty-icon">📭</div>Seleziona una casella per iniziare</div>
    </div>
    <div class="pagination" id="pagination" style="display:none">
      <button class="page-btn" id="prev-btn" onclick="changePage(-1)">← Prec</button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="next-btn" onclick="changePage(1)">Succ →</button>
    </div>
  </div>

  <div id="tab-current" style="display:none">
    <div style="padding:16px">
      <p style="font-size:12px;color:#64748b;margin-bottom:12px">Cerca nell'archivio l'email attualmente aperta in Outlook.</p>
      <button class="btn" onclick="searchCurrentEmail()">🔍 Cerca email corrente nell'archivio</button>
      <div id="current-result" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<!-- EMAIL DETAIL -->
<div id="email-detail">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">← Torna alla lista</button>
    <div class="detail-subject" id="detail-subject"></div>
    <div class="detail-meta" id="detail-meta"></div>
  </div>
  <div class="detail-actions">
    <button class="action-btn primary" onclick="toggleRestorePanel()">↩ Ripristina</button>
    <button class="action-btn secondary" onclick="exportEml()">⬇ Scarica EML</button>
  </div>
  <div class="restore-panel" id="restore-panel">
    <label>Ripristina nella casella:</label>
    <input type="email" id="restore-mailbox" placeholder="casella@azienda.it">
    <label>Cartella (opzionale):</label>
    <input type="text" id="restore-folder" placeholder="INBOX">
    <button class="action-btn primary" style="width:100%" onclick="doRestore()">↩ Ripristina ora</button>
    <div id="restore-msg" style="margin-top:6px"></div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<script>
const BASE_URL = window.location.origin;
let token = null;
let currentEmail = null;
let currentPage = 1;
let totalPages = 1;
let activeTab = 'search';

// ── Auth ──────────────────────────────────────────────────────────────────
Office.onReady(() => {
  const lg=document.getElementById("logo"); if(lg) lg.src=window.location.origin+"/logo.svg";
  token = localStorage.getItem("mh_plugin_token");
  if (token) initMain();
});

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  if (!email || !password) { err.textContent = 'Inserisci email e password'; return; }
  btn.disabled = true; btn.textContent = 'Accesso...'; err.textContent = '';
  try {
    const r = await fetch(`${BASE_URL}/api/plugin/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, client_type: 'outlook' })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Errore login');
    token = data.token;
    localStorage.setItem('mh_plugin_token', token);
    localStorage.setItem('mh_plugin_user', JSON.stringify(data.user));
    initMain();
  } catch (e) {
    err.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Accedi';
  }
}

function doLogout() {
  localStorage.removeItem('mh_plugin_token');
  localStorage.removeItem('mh_plugin_user');
  token = null;
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ── Init ──────────────────────────────────────────────────────────────────
async function initMain() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'flex';
  const user = JSON.parse(localStorage.getItem('mh_plugin_user') || '{}');
  document.getElementById('user-badge').textContent = user.email || 'Utente';
  await loadMailboxes();
}

async function api(path, opts = {}) {
  const r = await fetch(`${BASE_URL}/api/plugin${path}`, {
    ...opts,
    headers: { 'x-plugin-token': token, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  if (r.status === 401) { doLogout(); throw new Error('Sessione scaduta'); }
  return r;
}

// ── Mailboxes ─────────────────────────────────────────────────────────────
async function loadMailboxes() {
  try {
    const r = await api('/mailboxes');
    const data = await r.json();
    const sel = document.getElementById('mailbox-select');
    sel.innerHTML = '<option value="">— Seleziona casella —</option>';
    data.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id; opt.textContent = m.email;
      sel.appendChild(opt);
    });
    if (data.length === 1) { sel.value = data[0].id; loadEmails(); }
  } catch(e) {}
}

// ── Email list ────────────────────────────────────────────────────────────
async function loadEmails(page = 1) {
  currentPage = page;
  const mailboxId = document.getElementById('mailbox-select').value;
  const search = document.getElementById('search-input').value;
  if (!mailboxId) return;

  const container = document.getElementById('email-list-container');
  container.innerHTML = '<div class="loading">⏳ Caricamento...</div>';
  document.getElementById('pagination').style.display = 'none';

  try {
    const params = new URLSearchParams({ mailbox_id: mailboxId, page, limit: 20 });
    if (search) params.set('search', search);
    const r = await api(`/emails?${params}`);
    const data = await r.json();

    if (!data.items?.length) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>Nessuna email trovata</div>';
      return;
    }

    totalPages = Math.ceil(data.total / 20);
    container.innerHTML = data.items.map(e => `
      <div class="email-item" onclick="openEmail('${e.id}')">
        <div class="email-subject">
          ${e.subject || '(Nessun oggetto)'}
          ${e.spam_score >= 5 ? '<span class="spam-badge">SPAM</span>' : ''}
          ${e.has_attachments ? '<span class="attach-icon">📎</span>' : ''}
        </div>
        <div class="email-meta">
          <span class="sender">${e.sender_email || '-'}</span>
          <span class="date">${formatDate(e.sent_at)}</span>
        </div>
      </div>
    `).join('');

    if (totalPages > 1) {
      document.getElementById('pagination').style.display = 'flex';
      document.getElementById('page-info').textContent = `Pag. ${currentPage} di ${totalPages} (${data.total} email)`;
      document.getElementById('prev-btn').disabled = currentPage <= 1;
      document.getElementById('next-btn').disabled = currentPage >= totalPages;
    }
  } catch(e) {
    container.innerHTML = `<div class="error-msg">Errore: ${e.message}</div>`;
  }
}

function changePage(dir) { loadEmails(currentPage + dir); }

// ── Email detail ──────────────────────────────────────────────────────────
async function openEmail(id) {
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('email-detail').style.display = 'flex';
  document.getElementById('detail-body').innerHTML = '<div class="loading">⏳ Caricamento...</div>';

  try {
    const r = await api(`/emails/${id}`);
    const e = await r.json();
    currentEmail = e;

    document.getElementById('detail-subject').textContent = e.subject || '(Nessun oggetto)';
    document.getElementById('detail-meta').innerHTML = `
      <span><strong>Da:</strong> ${e.sender_name ? `${e.sender_name} &lt;${e.sender_email}&gt;` : e.sender_email}</span>
      <span><strong>Data:</strong> ${formatDate(e.sent_at)}</span>
      <span><strong>Cartella:</strong> ${e.path || 'INBOX'}</span>
    `;

    // Pre-compila casella restore
    document.getElementById('restore-mailbox').value = '';
    document.getElementById('restore-folder').value = e.path || 'INBOX';

    if (e.html) {
      const iframe = document.createElement('iframe');
      iframe.sandbox = 'allow-same-origin';
      document.getElementById('detail-body').innerHTML = '';
      document.getElementById('detail-body').appendChild(iframe);
      iframe.contentDocument.open();
      iframe.contentDocument.write(e.html);
      iframe.contentDocument.close();
      setTimeout(() => { iframe.style.height = iframe.contentDocument.body.scrollHeight + 20 + 'px'; }, 300);
    } else {
      document.getElementById('detail-body').innerHTML = `<div class="text-body">${e.text || '(Nessun contenuto)'}</div>`;
    }
  } catch(err) {
    document.getElementById('detail-body').innerHTML = `<div class="error-msg">${err.message}</div>`;
  }
}

function closeDetail() {
  document.getElementById('email-detail').style.display = 'none';
  document.getElementById('main-screen').style.display = 'flex';
  document.getElementById('restore-panel').style.display = 'none';
  document.getElementById('restore-msg').innerHTML = '';
}

// ── Restore ───────────────────────────────────────────────────────────────
function toggleRestorePanel() {
  const panel = document.getElementById('restore-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

async function doRestore() {
  const mailbox = document.getElementById('restore-mailbox').value;
  const folder = document.getElementById('restore-folder').value;
  const msg = document.getElementById('restore-msg');
  if (!mailbox) { msg.innerHTML = '<div class="error-msg">Inserisci la casella di destinazione</div>'; return; }
  msg.innerHTML = '<div class="loading">⏳ Ripristino...</div>';
  try {
    const r = await api(`/emails/${currentEmail.id}/restore`, {
      method: 'POST',
      body: JSON.stringify({ target_mailbox: mailbox, target_folder: folder })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    msg.innerHTML = `<div class="success-msg">✅ ${data.message}</div>`;
  } catch(e) {
    msg.innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
  }
}

// ── Cerca email corrente ──────────────────────────────────────────────────
async function searchCurrentEmail() {
  const container = document.getElementById('current-result');
  container.innerHTML = '<div class="loading">⏳ Ricerca...</div>';
  try {
    const item = Office.context.mailbox.item;
    const subject = item.subject;
    const from = item.from?.emailAddress;
    const mailboxId = document.getElementById('mailbox-select').value;
    if (!mailboxId) { container.innerHTML = '<div class="error-msg">Seleziona prima una casella nel tab Archivio</div>'; return; }
    const params = new URLSearchParams({ mailbox_id: mailboxId, search: subject || from, limit: 5 });
    const r = await api(`/emails?${params}`);
    const data = await r.json();
    if (!data.items?.length) { container.innerHTML = '<div class="empty">Email non trovata nell\'archivio</div>'; return; }
    container.innerHTML = data.items.map(e => `
      <div class="email-item" onclick="openEmail('${e.id}')">
        <div class="email-subject">${e.subject || '(Nessun oggetto)'}</div>
        <div class="email-meta"><span class="sender">${e.sender_email}</span><span class="date">${formatDate(e.sent_at)}</span></div>
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML = `<div class="error-msg">${e.message}</div>`;
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='search')||(i===1&&tab==='current')));
  document.getElementById('tab-search').style.display = tab === 'search' ? 'block' : 'none';
  document.getElementById('tab-current').style.display = tab === 'current' ? 'block' : 'none';
}

function formatDate(d) {
  if (!d) return '-';
  const date = new Date(d);
  return date.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'2-digit' }) + ' ' +
         date.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
}

async function exportEml() {
  if (!currentEmail) return;
  try {
    const r = await api(`/emails/${currentEmail.id}/eml`);
    if (!r.ok) throw new Error("Download fallito");
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=(currentEmail.subject||"email").replace(/[^a-z0-9]/gi,"_").substring(0,50)+".eml";
    a.click(); URL.revokeObjectURL(url);
  } catch(e) { alert("Errore: "+e.message); }
}
</script>
</body>
</html>
