services:
  mailhaven-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mailhaven-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=mailhaven-db
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - mailhaven-net
    depends_on:
      mailhaven-db:
        condition: service_healthy
    volumes:
      - mailhaven-clamav-db:/var/lib/clamav
      - ./data:/app/data
      - ./version.json:/app/version.json:ro
      - ./CHANGELOG.md:/app/CHANGELOG.md:ro
      - ./.env:/app/host/.env:rw
      - ./plugins:/app/plugins:ro
      - mailhaven-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailhaven-frontend:
    build: ./frontend
    container_name: mailhaven-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - mailhaven-net
    depends_on:
      mailhaven-backend:
        condition: service_healthy

  mailhaven-db:
    image: postgres:17-alpine
    container_name: mailhaven-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - mailhaven-db-data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mailhaven-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhaven-rspamd:
    image: rspamd/rspamd:latest
    container_name: mailhaven-rspamd
    restart: unless-stopped
    networks:
      - mailhaven-net
    mem_limit: 400m
    healthcheck:
      test: ["CMD-SHELL", "rspamc stat >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  mailhaven-net:
    driver: bridge

volumes:
  mailhaven-uploads:
    driver: local
  mailhaven-db-data:
    driver: local
  mailhaven-clamav-db:
    driver: local
