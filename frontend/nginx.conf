server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Pagina custom per 502/503 (backend in restart durante aggiornamento)
    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    location /plugin {
        proxy_pass http://mailhaven-backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout http_502 http_503;
    }

    # Stato dell'aggiornamento (scritto da do-update.sh in data/update-status.json,
    # montato in sola lettura). Servito come JSON, senza cache. Prima cadeva nel
    # fallback SPA e restituiva index.html → la barra di avanzamento restava ferma.
    location = /update-status.json {
        alias /srv/mhdata/update-status.json;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /avatars {
        proxy_pass http://mailhaven-backend:3001/avatars;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_next_upstream error timeout http_502 http_503;
    }

    location /uploads {
        proxy_pass http://mailhaven-backend:3001/uploads;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_next_upstream error timeout http_502 http_503;
    }

    location /api {
        proxy_pass http://mailhaven-backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_next_upstream error timeout http_502 http_503;
    }
}
