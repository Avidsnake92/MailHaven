<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aggiornamento in corso — MailHaven</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }
    .logo {
      width: 56px; height: 56px;
      background: #2563eb;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px; font-weight: 800; color: white;
    }
    h1 { font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    p  { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 28px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #eff6ff; color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 8px; padding: 6px 14px;
      font-size: 13px; font-weight: 500;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #2563eb;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .footer { margin-top: 32px; font-size: 12px; color: #94a3b8; }
  </style>
  <script>
    // Riprova ogni 5 secondi finché il backend risponde
    let attempts = 0;
    const check = () => {
      attempts++;
      fetch('/api/health').then(r => {
        if (r.ok) window.location.reload();
        else setTimeout(check, 5000);
      }).catch(() => setTimeout(check, 5000));
    };
    setTimeout(check, 5000);
  </script>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <div class="spinner"></div>
    <h1>Aggiornamento in corso</h1>
    <p>MailHaven si sta aggiornando all'ultima versione.<br>
       La pagina si ricaricherà automaticamente al termine.</p>
    <div class="badge">
      <div class="dot"></div>
      Riconnessione automatica...
    </div>
    <div class="footer">Di solito richiede meno di 60 secondi</div>
  </div>
</body>
</html>
